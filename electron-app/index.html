<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMining Worker Node</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --accent: #10b981;
            --accent-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 { margin-top: 0; color: var(--accent); }
        h3 { margin-bottom: 5px; color: var(--text-muted); }

        .hidden { display: none !important; }

        /* Login Screen */
        #login-screen {
            text-align: center;
            padding: 50px 20px;
        }

        input[type="text"] {
            width: 80%;
            max-width: 400px;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: var(--accent-hover); }
        button:disabled { background: #475569; cursor: not-allowed; }

        /* Dashboard Screen */
        #dashboard-screen {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #0f172a;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--accent);
            margin: 10px 0;
        }

        .terminal {
            background: #000;
            color: #10b981;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 6px;
            height: 300px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .terminal p { margin: 2px 0; }
        
        .pulse {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--accent);
            border-radius: 50%;
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h1>CMining Node</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Enter your Access Key to connect to the mining pool.</p>
        <div>
            <input type="text" id="access-key-input" placeholder="Enter Access Key (e.g. JUDD-XXXXX)">
        </div>
        <div>
            <button id="login-btn">Connect Wallet</button>
        </div>
        <p id="server-url" style="color: #64748b; font-size: 13px; margin-top: 10px;">🔗 Connecting to: ...</p>
        <p id="login-error" style="color: var(--danger); margin-top: 8px; height: 20px;"></p>
    </div>

    <div id="dashboard-screen" class="hidden">
        <div class="header-row">
            <div>
                <h1 style="margin:0;">CMining Active</h1>
                <div style="font-size: 14px; color: var(--text-muted);">Worker: <span id="worker-name">...</span></div>
            </div>
            <div class="status-badge">
                <span class="pulse"></span> 
                <span id="active-engine">Waiting for job...</span>
            </div>
            <button id="logout-btn" style="background: transparent; border: 1px solid #334155; padding: 8px 15px;">Disconnect</button>
        </div>

        <div class="terminal" id="terminal-output">
            <p>Initializing connection to mining pool...</p>
        </div>
    </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
